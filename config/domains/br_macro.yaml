# Domain configuration: Brazilian Macroeconomic Data
# Used by Veredas to configure all domain-specific behavior.

domain:
  id: br_macro
  name: "Veredas Brazil"
  description: "Brazilian macroeconomic data intelligence"
  country: "Brazil"
  country_code: "BR"
  currency: "BRL"
  currency_symbol: "R$"
  timezone: "America/Sao_Paulo"
  default_language: "pt"
  supported_languages: ["en", "pt"]

ai:
  scope_description:
    en: "Brazilian economic data analysis"
    pt: "análise de dados econômicos brasileiros"
  analyst_role:
    en: "economic data analyst for Brazilian macroeconomic indicators"
    pt: "analista de dados econômicos para indicadores macroeconômicos brasileiros"
  safety_message:
    en: >-
      Your question was blocked by our safety filter.
      My scope is **exclusively {scope}**.
      Please rephrase your question about indicators such as {example_indicators}.
    pt: >-
      Sua pergunta foi bloqueada pelo nosso filtro de segurança.
      Meu escopo é **exclusivamente {scope}**.
      Por favor, reformule sua pergunta sobre indicadores como {example_indicators}.
  example_indicators:
    en: "SELIC, IPCA, exchange rate, GDP, unemployment"
    pt: "SELIC, IPCA, câmbio, PIB, desemprego"
  anomaly_context:
    en: >-
      Consider Brazilian macroeconomic history: Plano Real (1994),
      2008 crisis, 2015-16 recession, 2020 pandemic.
    pt: >-
      Considere a história macroeconômica brasileira: Plano Real (1994),
      crise de 2008, recessão 2015-16, pandemia 2020.

data_sources:
  - id: bcb
    name: "Banco Central do Brasil"
    url: "https://www3.bcb.gov.br/sgspub/"
    description:
      en: "Interest rates (SELIC), inflation (IPCA), exchange rates (USD/BRL)"
      pt: "Taxas de juros (SELIC), inflação (IPCA), câmbio (USD/BRL)"
  - id: ibge
    name: "IBGE"
    url: "https://sidra.ibge.gov.br/"
    description:
      en: "Unemployment (PNAD), GDP, industrial production"
      pt: "Desemprego (PNAD), PIB, produção industrial"
  - id: tesouro
    name: "Tesouro Nacional"
    url: "https://www.tesourotransparente.gov.br/"
    description:
      en: "Government bond yields (Prefixado, IPCA+)"
      pt: "Rendimentos de títulos públicos (Prefixado, IPCA+)"
  - id: fred
    name: "Federal Reserve Economic Data"
    url: "https://fred.stlouisfed.org/"
    description:
      en: "Commodity prices (Brent, iron ore, soybeans) and US reference rates (Fed Funds, CPI)"
      pt: "Preços de commodities (Brent, minério, soja) e taxas de referência dos EUA (Fed Funds, CPI)"
  - id: focus
    name: "BCB FOCUS Survey"
    url: "https://olinda.bcb.gov.br/olinda/servico/Expectativas/"
    description:
      en: "Market consensus expectations for SELIC, IPCA, GDP, and exchange rate"
      pt: "Expectativas de mercado para SELIC, IPCA, PIB e câmbio"
  - id: world_bank
    name: "World Bank"
    url: "https://data.worldbank.org/"
    description:
      en: "International comparison indicators (GDP growth, CPI, unemployment, current account)"
      pt: "Indicadores de comparação internacional (crescimento do PIB, inflação, desemprego, conta corrente)"
  - id: ons
    name: "ONS - Operador Nacional do Sistema Elétrico"
    url: "https://dados.ons.org.br/"
    description:
      en: "Daily electricity load — real-time GDP proxy with zero lag"
      pt: "Carga de energia elétrica diária — proxy do PIB em tempo real sem defasagem"
  - id: derived
    name: "Derived (Computed)"
    url: "https://github.com/alexmonteiro/veredas"
    description:
      en: "Cross-series derived indicators computed by the pipeline (real rate, yield spread, divergence metrics)"
      pt: "Indicadores derivados entre séries computados pelo pipeline (taxa real, spread de juros, métricas de divergência)"

router:
  direct_lookup_patterns:
    - pattern: "(what|qual|quanto).*(current|atual|hoje|today|now|latest|último|ultima).*({keywords})"
      handler: latest_value
    - pattern: "(what|qual).*(latest|último|ultima|last|recent).*({keywords}|rate|taxa)"
      handler: latest_value
    - pattern: "(last|ultimo|última).*(value|valor|dado).*({keywords})"
      handler: latest_value

series:
  bcb_selic:
    label:
      en: "SELIC"
      pt: "SELIC"
    unit: "% a.a."
    source: "BCB"
    color: "#3b82f6"
    freshness_hours: 72
    domain: monetary_policy
    description:
      en: "Benchmark interest rate (taxa SELIC meta) set by Brazil's central bank (COPOM). Higher = tighter monetary policy."
      pt: "Taxa básica de juros definida pelo Banco Central. SELIC mais alta encarece o crédito e freia a inflação; mais baixa estimula empréstimos e o crescimento."
    keywords: ["selic"]

  bcb_ipca:
    label:
      en: "IPCA"
      pt: "IPCA"
    unit: "% a.m."
    source: "BCB"
    color: "#8b5cf6"
    freshness_hours: 1080
    domain: inflation
    chart_granularity: month
    description:
      en: "Official month-over-month consumer inflation index (IPCA). Above ~0.5%/month signals strong inflationary pressure."
      pt: "Índice oficial de preços ao consumidor, medido mês a mês. Valores positivos indicam alta de preços; acima de ~0,5% ao mês sinaliza pressão inflacionária forte."
    keywords: ["ipca", "inflação", "inflation"]

  bcb_usd_brl:
    label:
      en: "USD/BRL"
      pt: "USD/BRL"
    unit: "R$"
    source: "BCB"
    color: "#22c55e"
    freshness_hours: 72
    domain: exchange_rate
    description:
      en: "Exchange rate: how many reais one US dollar buys. Rising = real weakening."
      pt: "Quantos reais um dólar americano compra. Taxa em alta significa que o real está perdendo valor, encarecendo importações."
    keywords: ["dolar", "dollar", "usd", "cambio", "câmbio"]

  ibge_pnad:
    label:
      en: "Unemployment Rate"
      pt: "Taxa de Desemprego"
    unit: "%"
    source: "IBGE"
    color: "#f59e0b"
    freshness_hours: 2400
    domain: labor_market
    chart_granularity: month
    description:
      en: "Unemployment rate from IBGE PNAD household survey. Percentage of working-age population seeking but not finding work."
      pt: "Parcela da população economicamente ativa que procura emprego e não encontra. Medida trimestralmente pela PNAD do IBGE."
    keywords: ["desemprego", "unemployment"]

  ibge_gdp:
    label:
      en: "GDP"
      pt: "PIB"
    unit: "R$ bi"
    source: "IBGE"
    color: "#06b6d4"
    freshness_hours: 1080
    domain: output
    chart_granularity: month
    description:
      en: "GDP monthly proxy (BCB series 4380) in R$ billions, current prices. Broadest measure of economic output."
      pt: "Valor total de bens e serviços produzidos no Brasil, em bilhões de reais. É a medida mais ampla da atividade econômica."
    keywords: ["pib", "gdp"]

  ibge_pim:
    label:
      en: "Industrial Production"
      pt: "Produção Industrial"
    unit: "% MoM"
    source: "IBGE"
    color: "#0d9488"
    freshness_hours: 1080
    domain: activity
    chart_granularity: month
    description:
      en: "Industrial production (PIM-PF) month-over-month change, seasonally adjusted. Industry is ~25% of GDP."
      pt: "Produção industrial (PIM-PF) variação mês a mês, dessazonalizada. Indústria representa ~25% do PIB."
    keywords: ["produção industrial", "industrial production", "pim", "pim-pf"]

  ibge_pmc:
    label:
      en: "Retail Sales"
      pt: "Vendas no Varejo"
    unit: "% MoM"
    source: "IBGE"
    color: "#14b8a6"
    freshness_hours: 1440
    domain: activity
    chart_granularity: month
    description:
      en: "Retail sales (PMC) month-over-month change, seasonally adjusted. Retail is ~12% of GDP and a direct consumer spending gauge."
      pt: "Vendas no varejo (PMC) variação mês a mês, dessazonalizada. Varejo representa ~12% do PIB e mede o consumo diretamente."
    keywords: ["varejo", "retail", "pmc", "vendas"]

  ibge_pms:
    label:
      en: "Services"
      pt: "Serviços"
    unit: "% MoM"
    source: "IBGE"
    color: "#2dd4bf"
    freshness_hours: 1440
    domain: activity
    chart_granularity: month
    description:
      en: "Services sector (PMS) month-over-month change, seasonally adjusted. Services is ~70% of GDP — the dominant sector."
      pt: "Setor de serviços (PMS) variação mês a mês, dessazonalizada. Serviços representam ~70% do PIB — o setor dominante."
    keywords: ["serviços", "services", "pms"]

  tesouro_prefixado_curto:
    label:
      en: "Short-Term Fixed Rate"
      pt: "Prefixado Curto"
    unit: "% a.a."
    source: "Tesouro"
    color: "#ec4899"
    freshness_hours: 72
    domain: fixed_income
    description:
      en: "Average yield of pre-fixed government bonds (Tesouro Prefixado) maturing within 3 years. Reflects near-term market interest rate expectations."
      pt: "Média das taxas dos títulos prefixados (Tesouro Prefixado) com vencimento em até 3 anos. Reflete as expectativas de juros no curto prazo."
    keywords: ["tesouro", "prefixado", "prefixado curto"]

  tesouro_prefixado_longo:
    label:
      en: "Long-Term Fixed Rate"
      pt: "Prefixado Longo"
    unit: "% a.a."
    source: "Tesouro"
    color: "#f472b6"
    freshness_hours: 72
    domain: fixed_income
    description:
      en: "Average yield of pre-fixed government bonds (Tesouro Prefixado) maturing beyond 3 years. Reflects long-term rate expectations. The spread vs short-term indicates yield curve slope."
      pt: "Média das taxas dos títulos prefixados (Tesouro Prefixado) com vencimento acima de 3 anos. Reflete expectativas de juros no longo prazo. Compare com o curto para avaliar a inclinação da curva."
    keywords: ["prefixado longo"]

  tesouro_ipca:
    label:
      en: "Real Rate (IPCA+)"
      pt: "Juros Real (IPCA+)"
    unit: "% a.a."
    source: "Tesouro"
    color: "#fb923c"
    freshness_hours: 72
    domain: fixed_income
    description:
      en: "Average real yield of inflation-linked bonds (IPCA+, Educa+, Renda+). The real interest rate the market demands above IPCA inflation."
      pt: "Média dos juros reais dos títulos atrelados à inflação (IPCA+, Educa+, Renda+). Mostra a taxa real de juros que o mercado exige acima da inflação."
    keywords: ["juros real", "ntn-b"]

  bcb_cdi:
    label:
      en: "CDI"
      pt: "CDI"
    unit: "% a.d."
    source: "BCB"
    color: "#2563eb"
    freshness_hours: 72
    domain: monetary_policy
    description:
      en: "Daily interbank rate (CDI). Nearly all Brazilian fixed income is benchmarked to CDI. The SELIC-CDI spread is a liquidity indicator."
      pt: "Taxa interbancária diária (CDI). Quase toda a renda fixa brasileira é indexada ao CDI. O spread SELIC-CDI indica liquidez."
    keywords: ["cdi"]

  bcb_cdi_monthly:
    label:
      en: "Monthly CDI"
      pt: "CDI Mensal"
    unit: "% a.m."
    source: "BCB"
    color: "#1d4ed8"
    freshness_hours: 720
    domain: monetary_policy
    chart_granularity: month
    description:
      en: "CDI accumulated monthly rate. Used as benchmark for fund performance and fixed income returns."
      pt: "CDI acumulado no mês. Usado como referência para rendimento de fundos e renda fixa."
    keywords: ["cdi mensal", "cdi acumulado"]

  bcb_igpm:
    label:
      en: "IGP-M"
      pt: "IGP-M"
    unit: "% a.m."
    source: "BCB"
    color: "#7c3aed"
    freshness_hours: 720
    domain: inflation
    chart_granularity: month
    description:
      en: "IGP-M monthly variation (FGV). Used for rent adjustments in ~35M contracts. Heavily influenced by wholesale prices and exchange rate."
      pt: "Variação mensal do IGP-M (FGV). Usado para reajuste de aluguéis em ~35M de contratos. Fortemente influenciado por preços no atacado e câmbio."
    keywords: ["igpm", "igp-m", "igp"]

  bcb_inpc:
    label:
      en: "INPC"
      pt: "INPC"
    unit: "% a.m."
    source: "BCB"
    color: "#9333ea"
    freshness_hours: 1080
    domain: inflation
    chart_granularity: month
    description:
      en: "INPC monthly variation (IBGE). Minimum wage adjustment index — affects 50M+ workers."
      pt: "Variação mensal do INPC (IBGE). Índice de reajuste do salário mínimo — afeta mais de 50M de trabalhadores."
    keywords: ["inpc"]

  bcb_ipca15:
    label:
      en: "IPCA-15"
      pt: "IPCA-15"
    unit: "% a.m."
    source: "BCB"
    color: "#a855f7"
    freshness_hours: 720
    domain: inflation
    chart_granularity: month
    description:
      en: "IPCA-15 monthly preview, released ~1 week before official IPCA. Markets move on this as the inflation preview."
      pt: "Prévia mensal do IPCA, divulgada ~1 semana antes do IPCA oficial. Mercados reagem a este indicador como prévia da inflação."
    keywords: ["ipca-15", "ipca15", "ipca 15", "prévia"]

  bcb_default_total:
    label:
      en: "Total Default Rate"
      pt: "Inadimplência Total"
    unit: "%"
    source: "BCB"
    color: "#dc2626"
    freshness_hours: 1440
    domain: credit
    chart_granularity: month
    description:
      en: "Credit default rate for the total financial system. Earliest recession warning signal — rising defaults precede spending contraction by 2-3 months."
      pt: "Taxa de inadimplência do sistema financeiro total. Sinal mais precoce de recessão — inadimplência em alta precede queda do consumo em 2-3 meses."
    keywords: ["inadimplencia", "inadimplência", "default"]

  bcb_default_pf:
    label:
      en: "Consumer Default Rate"
      pt: "Inadimplência PF"
    unit: "%"
    source: "BCB"
    color: "#ef4444"
    freshness_hours: 1440
    domain: credit
    chart_granularity: month
    description:
      en: "Credit default rate for individuals (pessoa física). Consumer credit stress indicator."
      pt: "Taxa de inadimplência de pessoa física. Indicador de estresse no crédito ao consumidor."
    keywords: ["inadimplencia pf", "default pf"]

  bcb_default_pj:
    label:
      en: "Corporate Default Rate"
      pt: "Inadimplência PJ"
    unit: "%"
    source: "BCB"
    color: "#b91c1c"
    freshness_hours: 1440
    domain: credit
    chart_granularity: month
    description:
      en: "Credit default rate for corporates (pessoa jurídica). Business credit stress indicator."
      pt: "Taxa de inadimplência de pessoa jurídica. Indicador de estresse no crédito empresarial."
    keywords: ["inadimplencia pj", "default pj"]

  bcb_lending_rate:
    label:
      en: "Lending Rate"
      pt: "Taxa de Empréstimo"
    unit: "% a.a."
    source: "BCB"
    color: "#e11d48"
    freshness_hours: 720
    domain: credit
    chart_granularity: month
    description:
      en: "Average lending rate for new credit operations (total). Shows the actual cost of borrowing in Brazil."
      pt: "Taxa média de juros das novas concessões de crédito (total). Mostra o custo real do crédito no Brasil."
    keywords: ["emprestimo", "empréstimo", "lending", "taxa de juros média"]

  bcb_household_debt:
    label:
      en: "Household Debt"
      pt: "Endividamento Famílias"
    unit: "% renda"
    source: "BCB"
    color: "#f43f5e"
    freshness_hours: 1440
    domain: credit
    chart_granularity: month
    description:
      en: "Household debt to income ratio. Above 25% signals financial stress. Key indicator for consumer spending capacity."
      pt: "Relação dívida/renda das famílias. Acima de 25% sinaliza estresse financeiro. Indicador-chave de capacidade de consumo."
    keywords: ["endividamento", "household debt", "divida familias"]

  bcb_ibc_br:
    label:
      en: "IBC-Br"
      pt: "IBC-Br"
    unit: "Index"
    source: "BCB"
    color: "#0891b2"
    freshness_hours: 1080
    domain: activity
    chart_granularity: month
    description:
      en: "IBC-Br economic activity index (BCB GDP proxy, seasonally adjusted). Monthly frequency vs quarterly GDP — the fastest official activity gauge."
      pt: "Índice de atividade econômica IBC-Br (proxy mensal do PIB, dessazonalizado). Frequência mensal vs PIB trimestral — o indicador oficial de atividade mais rápido."
    keywords: ["ibc-br", "ibc", "atividade econômica", "economic activity"]

  bcb_debt_gdp:
    label:
      en: "Debt/GDP"
      pt: "Dívida/PIB"
    unit: "% PIB"
    source: "BCB"
    color: "#ea580c"
    freshness_hours: 720
    domain: fiscal
    chart_granularity: month
    description:
      en: "Net public debt as % of GDP. THE metric for sovereign risk — what rating agencies watch most closely."
      pt: "Dívida pública líquida como % do PIB. O principal indicador de risco soberano — o mais observado pelas agências de rating."
    keywords: ["divida", "dívida", "debt gdp", "divida pib"]

  bcb_fiscal_balance:
    label:
      en: "Primary Balance"
      pt: "Resultado Primário"
    unit: "% PIB"
    source: "BCB"
    color: "#c2410c"
    freshness_hours: 720
    domain: fiscal
    chart_granularity: month
    description:
      en: "Primary fiscal balance (12-month accumulated, % GDP). Positive = surplus, negative = deficit. Drives CDS spreads and long-term yields."
      pt: "Resultado primário consolidado (acumulado 12 meses, % PIB). Positivo = superávit, negativo = déficit. Influencia CDS e juros longos."
    keywords: ["resultado primário", "fiscal", "superavit", "superávit", "deficit", "déficit"]

  bcb_trade_balance:
    label:
      en: "Trade Balance"
      pt: "Balança Comercial"
    unit: "USD mi"
    source: "BCB"
    color: "#059669"
    freshness_hours: 1440
    domain: external
    chart_granularity: month
    description:
      en: "Trade balance (exports minus imports) in USD millions. Positive = surplus. Key driver of BRL and current account."
      pt: "Balança comercial (exportações menos importações) em USD milhões. Positivo = superávit. Fator-chave do câmbio e conta corrente."
    keywords: ["balança comercial", "trade balance", "exportações", "importações"]

  bcb_reserves:
    label:
      en: "Int'l Reserves"
      pt: "Reservas Internacionais"
    unit: "USD mi"
    source: "BCB"
    color: "#047857"
    freshness_hours: 720
    domain: external
    description:
      en: "International reserves in USD millions. Buffer against external shocks and currency crises."
      pt: "Reservas internacionais em USD milhões. Colchão contra choques externos e crises cambiais."
    keywords: ["reservas", "reserves"]

  bcb_ibovespa:
    label:
      en: "IBOVESPA"
      pt: "IBOVESPA"
    unit: "Points"
    source: "BCB"
    color: "#ca8a04"
    freshness_hours: 72
    domain: equity
    description:
      en: "IBOVESPA index closing value. Main Brazilian stock market benchmark, heavily weighted toward commodities and banks."
      pt: "Valor de fechamento do índice IBOVESPA. Principal benchmark do mercado de ações brasileiro, concentrado em commodities e bancos."
    keywords: ["ibovespa", "bolsa", "bovespa", "stock"]

  bcb_consumer_confidence:
    label:
      en: "Consumer Confidence"
      pt: "Confiança Consumidor"
    unit: "Index"
    source: "BCB"
    color: "#65a30d"
    freshness_hours: 720
    domain: sentiment
    chart_granularity: month
    description:
      en: "Consumer confidence index (ICC/FGV). Leading indicator for retail spending. Higher = more optimistic households."
      pt: "Índice de confiança do consumidor (ICC/FGV). Indicador antecedente do consumo no varejo. Maior = famílias mais otimistas."
    keywords: ["confiança consumidor", "consumer confidence", "icc"]

  bcb_industry_confidence:
    label:
      en: "Industry Confidence"
      pt: "Confiança Indústria"
    unit: "Index"
    source: "BCB"
    color: "#4d7c0f"
    freshness_hours: 720
    domain: sentiment
    chart_granularity: month
    description:
      en: "Industry confidence index (ICI/FGV). Leading indicator for industrial production and investment."
      pt: "Índice de confiança da indústria (ICI/FGV). Indicador antecedente da produção industrial e investimento."
    keywords: ["confiança indústria", "industry confidence", "ici"]

  bcb_m1:
    label:
      en: "M1"
      pt: "M1"
    unit: "R$ mi"
    source: "BCB"
    color: "#0284c7"
    freshness_hours: 720
    domain: monetary
    chart_granularity: month
    description:
      en: "M1 money supply (currency in circulation + demand deposits). Narrow money — most liquid monetary aggregate."
      pt: "Oferta monetária M1 (papel-moeda + depósitos à vista). Agregado monetário mais restrito e líquido."
    keywords: ["m1", "oferta monetária", "money supply"]

  bcb_m2:
    label:
      en: "M2"
      pt: "M2"
    unit: "R$ mi"
    source: "BCB"
    color: "#0369a1"
    freshness_hours: 720
    domain: monetary
    chart_granularity: month
    description:
      en: "M2 money supply (M1 + savings deposits + time deposits). Broad money indicator — tracks overall liquidity in the economy."
      pt: "Oferta monetária M2 (M1 + poupança + depósitos a prazo). Indicador de liquidez ampla — mede a liquidez total na economia."
    keywords: ["m2"]

  fred_brent:
    label:
      en: "Brent Oil"
      pt: "Petróleo Brent"
    unit: "USD/bbl"
    source: "FRED"
    color: "#854d0e"
    freshness_hours: 72
    domain: commodities
    description:
      en: "Brent crude oil price (USD/barrel). Key driver of Brazilian trade balance and Petrobras revenue."
      pt: "Preço do petróleo Brent (USD/barril). Fator-chave da balança comercial e receita da Petrobras."
    keywords: ["petróleo", "brent", "oil", "petroleo"]

  fred_iron_ore:
    label:
      en: "Iron Ore"
      pt: "Minério de Ferro"
    unit: "USD/t"
    source: "FRED"
    color: "#92400e"
    freshness_hours: 720
    domain: commodities
    description:
      en: "Iron ore price (62% Fe, USD/dry metric ton). Brazil's #1 export commodity — directly impacts Vale and trade balance."
      pt: "Preço do minério de ferro (62% Fe, USD/tonelada seca). Principal commodity de exportação do Brasil — impacta Vale e balança comercial."
    keywords: ["minério de ferro", "iron ore", "minerio", "vale"]

  fred_soybeans:
    label:
      en: "Soybeans"
      pt: "Soja"
    unit: "USD/t"
    source: "FRED"
    color: "#a16207"
    freshness_hours: 720
    domain: commodities
    description:
      en: "Soybeans price (USD/metric ton). Brazil is the world's largest producer — agribusiness drives rural GDP."
      pt: "Preço da soja (USD/tonelada métrica). Brasil é o maior produtor mundial — agronegócio impulsiona o PIB rural."
    keywords: ["soja", "soybeans", "soybean", "agro"]

  fred_fedfunds:
    label:
      en: "Fed Funds Rate"
      pt: "Fed Funds Rate"
    unit: "%"
    source: "FRED"
    color: "#475569"
    freshness_hours: 720
    domain: international
    chart_granularity: month
    description:
      en: "US Federal Funds effective rate. Global risk-free reference — the spread vs SELIC drives capital flows to/from Brazil."
      pt: "Taxa efetiva dos Fed Funds dos EUA. Referência global de taxa livre de risco — o spread vs SELIC determina fluxos de capital."
    keywords: ["fed funds", "fed", "federal reserve", "us rate"]

  fred_uscpi:
    label:
      en: "US CPI"
      pt: "CPI EUA"
    unit: "Index"
    source: "FRED"
    color: "#64748b"
    freshness_hours: 720
    domain: international
    chart_granularity: month
    description:
      en: "US Consumer Price Index (1982-84=100). US inflation trajectory influences Fed policy, which in turn affects emerging markets including Brazil."
      pt: "Índice de preços ao consumidor dos EUA (1982-84=100). Trajetória da inflação americana influencia política do Fed, que afeta mercados emergentes como o Brasil."
    keywords: ["cpi eua", "us cpi", "us inflation", "inflação eua"]

  focus_ipca:
    label:
      en: "FOCUS IPCA"
      pt: "FOCUS IPCA"
    unit: "% a.a."
    source: "BCB FOCUS"
    color: "#c026d3"
    freshness_hours: 168
    domain: inflation
    chart_granularity: week
    description:
      en: "Market consensus expectation for year-end IPCA inflation. Updated weekly (Monday). 120+ financial institutions surveyed."
      pt: "Expectativa de consenso do mercado para IPCA no fim do ano. Atualizado semanalmente (segunda-feira). 120+ instituições pesquisadas."
    keywords: ["focus ipca", "expectativa ipca", "ipca expectation"]

  focus_selic:
    label:
      en: "FOCUS SELIC"
      pt: "FOCUS SELIC"
    unit: "% a.a."
    source: "BCB FOCUS"
    color: "#d946ef"
    freshness_hours: 168
    domain: monetary_policy
    chart_granularity: week
    description:
      en: "Market consensus expectation for year-end SELIC rate. The gap between FOCUS consensus and DI curve pricing signals market positioning."
      pt: "Expectativa de consenso do mercado para SELIC no fim do ano. A diferença entre FOCUS e curva DI sinaliza posicionamento do mercado."
    keywords: ["focus selic", "expectativa selic", "selic expectation"]

  focus_gdp:
    label:
      en: "FOCUS GDP"
      pt: "FOCUS PIB"
    unit: "% a.a."
    source: "BCB FOCUS"
    color: "#e879f9"
    freshness_hours: 168
    domain: output
    chart_granularity: week
    description:
      en: "Market consensus expectation for annual GDP growth. Leading indicator for economic outlook."
      pt: "Expectativa de consenso do mercado para crescimento do PIB anual. Indicador antecedente da perspectiva econômica."
    keywords: ["focus pib", "focus gdp", "expectativa pib", "gdp expectation"]

  focus_fx:
    label:
      en: "FOCUS FX"
      pt: "FOCUS Câmbio"
    unit: "R$/USD"
    source: "BCB FOCUS"
    color: "#f0abfc"
    freshness_hours: 168
    domain: exchange_rate
    chart_granularity: week
    description:
      en: "Market consensus expectation for year-end USD/BRL exchange rate."
      pt: "Expectativa de consenso do mercado para câmbio USD/BRL no fim do ano."
    keywords: ["focus cambio", "focus câmbio", "expectativa cambio", "fx expectation"]

  wb_gdp_growth:
    label:
      en: "Brazil GDP (WB)"
      pt: "PIB Brasil (WB)"
    unit: "% a.a."
    source: "World Bank"
    color: "#334155"
    freshness_hours: 2160
    domain: international
    chart_granularity: year
    description:
      en: "Brazil GDP growth rate (annual %) from World Bank. Comparable cross-country methodology."
      pt: "Crescimento do PIB do Brasil (% anual) pelo Banco Mundial. Metodologia comparável entre países."
    keywords: ["gdp growth wb", "crescimento pib wb"]

  wb_cpi:
    label:
      en: "Brazil CPI (WB)"
      pt: "Inflação Brasil (WB)"
    unit: "% a.a."
    source: "World Bank"
    color: "#475569"
    freshness_hours: 2160
    domain: international
    chart_granularity: year
    description:
      en: "Brazil CPI inflation (annual %) from World Bank. Enables cross-country inflation comparison."
      pt: "Inflação pelo IPC do Brasil (% anual) pelo Banco Mundial. Permite comparação internacional."
    keywords: ["cpi wb", "inflation wb"]

  wb_unemployment:
    label:
      en: "Brazil Unemployment (WB)"
      pt: "Desemprego Brasil (WB)"
    unit: "%"
    source: "World Bank"
    color: "#64748b"
    freshness_hours: 2160
    domain: international
    chart_granularity: year
    description:
      en: "Brazil unemployment rate (% of labor force) from World Bank (ILO estimate)."
      pt: "Taxa de desemprego do Brasil (% da força de trabalho) pelo Banco Mundial (estimativa OIT)."
    keywords: ["unemployment wb", "desemprego wb"]

  wb_current_account:
    label:
      en: "Current Account (WB)"
      pt: "Conta Corrente (WB)"
    unit: "USD"
    source: "World Bank"
    color: "#94a3b8"
    freshness_hours: 2160
    domain: international
    chart_granularity: year
    description:
      en: "Brazil current account balance (USD) from World Bank. Negative = deficit, importing more capital than exporting."
      pt: "Saldo em conta corrente do Brasil (USD) pelo Banco Mundial. Negativo = déficit, importando mais capital do que exportando."
    keywords: ["conta corrente wb", "current account wb"]

  ons_electricity:
    label:
      en: "Electricity Load"
      pt: "Carga Elétrica"
    unit: "MWmed"
    source: "ONS"
    color: "#eab308"
    freshness_hours: 48
    domain: activity
    description:
      en: "Daily national electricity load (sum of 4 subsystems). Real-time GDP proxy — daily frequency with zero lag while official GDP lags 2-3 months. No other free Brazilian platform offers this."
      pt: "Carga diária nacional de energia elétrica (soma dos 4 subsistemas). Proxy do PIB em tempo real — frequência diária sem defasagem enquanto PIB oficial atrasa 2-3 meses."
    keywords: ["eletricidade", "electricity", "energia", "energy", "carga", "ons"]

  derived_real_rate:
    label:
      en: "Real Interest Rate"
      pt: "Taxa Real de Juros"
    unit: "% a.a."
    source: "Derived"
    color: "#dc2626"
    freshness_hours: 168
    domain: monetary_policy
    chart_granularity: month
    description:
      en: "Real interest rate: SELIC annualized minus trailing 12-month compounded IPCA. Core indicator of monetary policy stance — positive real rate indicates restrictive policy."
      pt: "Taxa real de juros: SELIC anualizada menos IPCA acumulado 12 meses. Indicador central da postura monetária — taxa real positiva indica política restritiva."
    keywords: ["taxa real", "real rate", "real interest", "juros reais"]

  derived_ipca_gdp_divergence:
    label:
      en: "IPCA-GDP Divergence"
      pt: "Divergência IPCA-PIB"
    unit: "index"
    source: "Derived"
    color: "#f97316"
    freshness_hours: 168
    domain: activity
    chart_granularity: month
    description:
      en: "IPCA vs GDP proxy (IBC-Br) normalized spread. Positive values signal inflation outpacing growth (stagflationary pressure). Computed as z-score(IPCA) minus z-score(IBC-Br)."
      pt: "Spread normalizado IPCA vs proxy do PIB (IBC-Br). Valores positivos sinalizam inflação superando crescimento (pressão estagflacionária). Calculado como z-score(IPCA) menos z-score(IBC-Br)."
    keywords: ["divergência", "divergence", "ipca pib", "ipca gdp", "estagflação", "stagflation"]

  derived_yield_spread:
    label:
      en: "Yield Curve Spread"
      pt: "Spread da Curva de Juros"
    unit: "p.p."
    source: "Derived"
    color: "#7c3aed"
    freshness_hours: 168
    domain: fixed_income
    description:
      en: "Yield curve slope: long-term prefixado minus short-term prefixado rate. Positive = normal curve (growth expectation). Negative = inverted curve (recession signal)."
      pt: "Inclinação da curva de juros: taxa prefixado longo menos prefixado curto. Positivo = curva normal (expectativa de crescimento). Negativo = curva invertida (sinal de recessão)."
    keywords: ["yield spread", "curva de juros", "yield curve", "inclinação", "slope"]

app:
  title: "Veredas"
  session_cookie_name: "veredas_session"
  meta_description:
    en: "Data intelligence platform"
    pt: "Plataforma de inteligência de dados"
  github_url: "https://github.com/alexmonteiro/veredas"

landing:
  hero_title:
    en: "Enterprise Macro Intelligence Engine"
    pt: "Motor de Inteligência Macro para Instituições"
  hero_subtitle:
    en: "Your dedicated AI analyst for Brazilian macroeconomic data. Real-time data aggregation, tiered AI reasoning, and quantitative accuracy for asset managers and research firms."
    pt: "Seu analista dedicado de IA para dados macroeconômicos. Agregação em tempo real, raciocínio de IA em camadas e precisão quantitativa para gestoras e research."
  features:
    - icon: ai
      title:
        en: "AI Analyst Co-pilot"
        pt: "Analista de IA Dedicado"
      description:
        en: "Query complex macroeconomic relationships in natural language. The engine combines exact quantitative lookups with advanced qualitative reasoning."
        pt: "Consulte relações macroeconômicas complexas em linguagem natural. O motor combina buscas quantitativas exatas com raciocínio qualitativo avançado."
    - icon: database
      title:
        en: "Resilient Data Pipeline"
        pt: "Pipeline de Dados Resiliente"
      description:
        en: "Built on financial-grade infrastructure with automated daily ingestion, robust data quality validations, and deterministic query execution for exact math."
        pt: "Construído sobre infraestrutura de nível financeiro com ingestão diária automática, robustas validações de qualidade e execução de queries determinísticas."
    - icon: chart
      title:
        en: "Real-Time Central Bank & IBGE Data"
        pt: "Dados em Tempo Real do BCB e IBGE"
      description:
        en: "Daily and monthly indicators spanning SELIC, IPCA, GDP proxy, and ONS load, directly sourced and cross-analyzed for early market signals."
        pt: "Indicadores diários e mensais como SELIC, IPCA, proxy do PIB e carga do ONS, extraídos diretamente e analisados em conjunto para sinais precoces de mercado."
    - icon: alert
      title:
        en: "Statistical Anomaly Alerts"
        pt: "Alertas Estatísticos de Anomalias"
      description:
        en: "Automated event-driven anomaly detection flags statistical outliers (z-score > 2) and sends immediate AI-generated commentary to your team."
        pt: "Detecção automatizada baseada em eventos que sinaliza outliers estatísticos (z-score > 2) e envia comentários gerados por IA para a sua equipe."
    - icon: eye
      title:
        en: "Financial Pipeline Governance"
        pt: "Governança de Dados Financeiros"
      description:
        en: "Enterprise-grade observability into schema evolution, null rates, and freshness, ensuring ultimate trust in the analytical outputs."
        pt: "Observabilidade de nível enterprise de evolução de schemas, taxas de valores nulos e frescor de dados, garantindo confiança absoluta nos outputs."
    - icon: globe
      title:
        en: "Bilingual by Default"
        pt: "Bilíngue Nativamente"
      description:
        en: "Full Portuguese and English support for global investment teams investigating Brazilian markets and emerging market trends."
        pt: "Suporte completo em português e inglês para equipes de investimento globais investigando o mercado brasileiro."

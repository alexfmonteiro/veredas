feed_id: ons_electricity
name: "ONS Daily Electricity Load"
version: "1.0.0"
status: paused  # ONS 2026 resource not published yet; re-enable when available

# NOTE: ONS resource IDs change per year. Update the URL annually.
# To find current resource: https://dados.ons.org.br/api/3/action/package_show?id=carga-energia
source:
  type: api
  url: "https://dados.ons.org.br/dataset/carga-energia/resource/d013312e-d836-4d94-86d4-1f279beaecf2/download/CARGA_ENERGIA_2026.csv"
  format: csv
  csv_separator: ";"
  auth_method: none
  rate_limit_rpm: 10

schedule:
  cron: "0 8 * * *"
  timezone: "America/Sao_Paulo"
  retry_attempts: 3
  retry_delay_seconds: 120

schema_fields:
  - name: din_instante
    source_field: din_instante
    type: string
    required: true
    description: "Reference date (YYYY-MM-DD)"
    silver_type: DATE
    silver_expression: "strptime(\"{col}\", '%Y-%m-%d')"
  - name: id_subsistema
    source_field: id_subsistema
    type: string
    required: false
    description: "Subsystem code"
  - name: nom_subsistema
    source_field: nom_subsistema
    type: string
    required: false
    description: "Subsystem name (SE/CO, S, NE, N)"
  - name: val_cargaenergiamwmed
    source_field: val_cargaenergiamwmed
    type: string
    required: true
    description: "Energy load in MWmed"
    silver_type: DOUBLE
    silver_expression: "TRY_CAST(\"{col}\" AS DOUBLE)"

processing:
  bronze:
    write_mode: append
    rescued_data_column: "_rescued_data"
  silver:
    processing_type: latest_only
    primary_key:
      - series
      - date
    dedup_columns:
      - date
    dedup_order_by: "_ingested_at DESC"
    aggregation: sum

quality:
  bronze:
    max_null_rate: 0.05
    min_row_count: 1
    max_rescued_data_rate: 0.10
  gold:
    max_null_rate: 0.05
    min_row_count: 1
    value_range_min: 30000.0
    value_range_max: 120000.0

metadata:
  unit: "MWmed"
  tags:
    - electricity
    - energy
    - ons
    - alternative_data
    - gdp_proxy
  domain: activity

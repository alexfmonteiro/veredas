feed_id: fred_fedfunds
name: "FRED Federal Funds Rate"
version: "1.0.0"
status: active

source:
  type: api
  url: "https://api.stlouisfed.org/fred/series/observations?series_id=FEDFUNDS&file_type=json&observation_start=2020-01-01"
  format: json
  auth_method: api_key_query
  auth_key_env: FRED_API_KEY
  json_data_path: "observations"
  rate_limit_rpm: 60
  backfill_url: "https://api.stlouisfed.org/fred/series/observations?series_id=FEDFUNDS&file_type=json&observation_start=1954-07-01"

schedule:
  cron: "0 8 5 * *"
  timezone: "America/Sao_Paulo"
  retry_attempts: 3
  retry_delay_seconds: 60

schema_fields:
  - name: date
    source_field: date
    type: string
    required: true
    description: "Observation date (YYYY-MM-DD)"
    silver_type: DATE
    silver_expression: "strptime(\"{col}\", '%Y-%m-%d')"
  - name: value
    source_field: value
    type: string
    required: true
    description: "Federal funds effective rate (%)"
    silver_type: DOUBLE
    silver_expression: "TRY_CAST(NULLIF(\"{col}\", '.') AS DOUBLE)"

processing:
  bronze:
    write_mode: append
    rescued_data_column: "_rescued_data"
  silver:
    processing_type: latest_only
    primary_key:
      - series
      - date
    dedup_columns:
      - date
    dedup_order_by: "_ingested_at DESC"

quality:
  bronze:
    max_null_rate: 0.02
    min_row_count: 1
    max_rescued_data_rate: 1.0
  gold:
    max_null_rate: 0.05
    min_row_count: 1
    value_range_min: 0.0
    value_range_max: 25.0

metadata:
  unit: "%"
  tags:
    - fed_funds
    - interest_rate
    - us_macro
    - fred
    - federal_reserve
  domain: international

feed_id: wb_unemployment
name: "World Bank Unemployment Brazil"
version: "1.0.0"
status: active

source:
  type: api
  url: "https://api.worldbank.org/v2/country/BRA/indicator/SL.UEM.TOTL.ZS?format=json&date=2015:2026&per_page=100"
  format: json
  auth_method: none
  json_data_path: "1"
  rate_limit_rpm: 30
  backfill_url: "https://api.worldbank.org/v2/country/BRA/indicator/SL.UEM.TOTL.ZS?format=json&date=1960:2026&per_page=500"

schedule:
  cron: "0 8 1 1,4,7,10 *"
  timezone: "America/Sao_Paulo"
  retry_attempts: 3
  retry_delay_seconds: 60

schema_fields:
  - name: date
    source_field: date
    type: string
    required: true
    description: "Reference year"
    silver_type: DATE
    silver_expression: "make_date(CAST(\"{col}\" AS INTEGER), 1, 1)"
  - name: value
    source_field: value
    type: string
    required: true
    description: "Unemployment rate (% of labor force)"
    silver_type: DOUBLE
    silver_expression: "TRY_CAST(\"{col}\" AS DOUBLE)"
  - name: country_code
    source_field: countryiso3code
    type: string
    required: false
    description: "ISO 3166-1 alpha-3 country code"

processing:
  bronze:
    write_mode: append
    rescued_data_column: "_rescued_data"
  silver:
    processing_type: latest_only
    primary_key:
      - series
      - date
    dedup_columns:
      - date
    dedup_order_by: "_ingested_at DESC"

quality:
  bronze:
    max_null_rate: 0.10
    min_row_count: 1
    max_rescued_data_rate: 1.0
  gold:
    max_null_rate: 0.20
    min_row_count: 1
    value_range_min: 0.0
    value_range_max: 30.0

metadata:
  unit: "% a.a."
  tags:
    - unemployment
    - labor_market
    - world_bank
    - international
  domain: international

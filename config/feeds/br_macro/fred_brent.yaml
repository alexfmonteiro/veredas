feed_id: fred_brent
name: "FRED Brent Crude Oil"
version: "1.0.0"
status: active

source:
  type: api
  url: "https://api.stlouisfed.org/fred/series/observations?series_id=DCOILBRENTEU&file_type=json&observation_start=2020-01-01"
  format: json
  auth_method: api_key_query
  auth_key_env: FRED_API_KEY
  json_data_path: "observations"
  rate_limit_rpm: 60
  backfill_url: "https://api.stlouisfed.org/fred/series/observations?series_id=DCOILBRENTEU&file_type=json&observation_start=1987-01-01"

schedule:
  cron: "0 8 * * 1-5"
  timezone: "America/Sao_Paulo"
  retry_attempts: 3
  retry_delay_seconds: 60

schema_fields:
  - name: date
    source_field: date
    type: string
    required: true
    description: "Observation date (YYYY-MM-DD)"
    silver_type: DATE
    silver_expression: "strptime(\"{col}\", '%Y-%m-%d')"
  - name: value
    source_field: value
    type: string
    required: true
    description: "Brent crude oil price (USD/barrel)"
    silver_type: DOUBLE
    silver_expression: "TRY_CAST(NULLIF(\"{col}\", '.') AS DOUBLE)"

processing:
  bronze:
    write_mode: append
    rescued_data_column: "_rescued_data"
  silver:
    processing_type: latest_only
    primary_key:
      - series
      - date
    dedup_columns:
      - date
    dedup_order_by: "_ingested_at DESC"

quality:
  bronze:
    max_null_rate: 0.05
    min_row_count: 1
    max_rescued_data_rate: 1.0
  gold:
    max_null_rate: 0.10
    min_row_count: 1
    value_range_min: 0.0
    value_range_max: 200.0

metadata:
  unit: "USD/bbl"
  tags:
    - brent
    - oil
    - commodity
    - energy
    - fred
  domain: commodities

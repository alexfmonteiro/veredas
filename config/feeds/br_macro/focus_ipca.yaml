feed_id: focus_ipca
name: "BCB FOCUS IPCA Expectations"
version: "1.0.0"
status: active

source:
  type: api
  url: "https://olinda.bcb.gov.br/olinda/servico/Expectativas/versao/v1/odata/ExpectativasMercadoAnuais?$top=52&$format=json&$filter=Indicador%20eq%20'IPCA'%20and%20DataReferencia%20eq%20'2026'%20and%20baseCalculo%20eq%200&$orderby=Data%20desc"
  format: json
  auth_method: none
  json_data_path: "value"
  rate_limit_rpm: 30
  backfill_url: "https://olinda.bcb.gov.br/olinda/servico/Expectativas/versao/v1/odata/ExpectativasMercadoAnuais?$top=5000&$format=json&$filter=Indicador%20eq%20'IPCA'%20and%20DataReferencia%20eq%20'2026'%20and%20baseCalculo%20eq%200&$orderby=Data%20desc"

schedule:
  cron: "0 10 * * 1"
  timezone: "America/Sao_Paulo"
  retry_attempts: 3
  retry_delay_seconds: 60

schema_fields:
  - name: data
    source_field: Data
    type: string
    required: true
    description: "Survey collection date (YYYY-MM-DD)"
    silver_type: DATE
    silver_expression: "strptime(\"{col}\", '%Y-%m-%d')"
  - name: mediana
    source_field: Mediana
    type: string
    required: true
    description: "Market median expectation"
    silver_type: DOUBLE
    silver_expression: "TRY_CAST(\"{col}\" AS DOUBLE)"
  - name: indicador
    source_field: Indicador
    type: string
    required: false
    description: "Indicator name"
  - name: data_referencia
    source_field: DataReferencia
    type: string
    required: false
    description: "Forecast horizon year"
  - name: media
    source_field: Media
    type: string
    required: false
    description: "Market mean expectation"
  - name: numero_respondentes
    source_field: numeroRespondentes
    type: string
    required: false
    description: "Number of respondents"

processing:
  bronze:
    write_mode: append
    rescued_data_column: "_rescued_data"
  silver:
    processing_type: latest_only
    primary_key:
      - series
      - date
    dedup_columns:
      - date
    dedup_order_by: "_ingested_at DESC"

quality:
  bronze:
    max_null_rate: 0.05
    min_row_count: 1
    max_rescued_data_rate: 1.0
  gold:
    max_null_rate: 0.05
    min_row_count: 1
    value_range_min: -50.0
    value_range_max: 500.0

metadata:
  unit: "% a.a."
  tags:
    - focus
    - ipca
    - expectations
    - bcb
    - inflation
  domain: inflation

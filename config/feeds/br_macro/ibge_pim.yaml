feed_id: ibge_pim
name: "IBGE PIM-PF Industrial Production"
version: "1.0.0"
status: active

source:
  type: api
  url: "https://apisidra.ibge.gov.br/values/t/8888/n1/all/v/12606/p/last%2060/d/v12606%202"
  format: json
  auth_method: none
  rate_limit_rpm: 10
  # IBGE SIDRA returns a header row as the first array element
  skip_rows: 1
  backfill_url: "https://apisidra.ibge.gov.br/values/t/8888/n1/all/v/12606/p/all/d/v12606%202"

schedule:
  cron: "0 6 15 * *"
  timezone: "America/Sao_Paulo"
  retry_attempts: 3
  retry_delay_seconds: 60

schema_fields:
  - name: nc
    source_field: NC
    type: string
    required: false
    description: "Country level code"
  - name: nn
    source_field: NN
    type: string
    required: false
    description: "Country level name"
  - name: mc
    source_field: MC
    type: string
    required: false
    description: "Measure code"
  - name: mn
    source_field: MN
    type: string
    required: false
    description: "Measure name"
  - name: v
    source_field: V
    type: string
    required: true
    description: "Value (industrial production % MoM, seasonally adjusted)"
    silver_type: DOUBLE
    silver_expression: "TRY_CAST(\"{col}\" AS DOUBLE)"
  - name: d1c
    source_field: D1C
    type: string
    required: false
    description: "Geographic level code"
  - name: d1n
    source_field: D1N
    type: string
    required: false
    description: "Geographic level name"
  - name: d2c
    source_field: D2C
    type: string
    required: false
    description: "Variable code"
  - name: d2n
    source_field: D2N
    type: string
    required: false
    description: "Variable name"
  - name: d3c
    source_field: D3C
    type: string
    required: true
    description: "Period code (YYYYMM)"
    silver_type: DATE
    silver_expression: "make_date(CAST(LEFT(\"{col}\", 4) AS INTEGER), CAST(RIGHT(\"{col}\", 2) AS INTEGER), 1)"
  - name: d3n
    source_field: D3N
    type: string
    required: false
    description: "Period name"
  - name: d4c
    source_field: D4C
    type: string
    required: false
    description: "Decimal places code"
  - name: d4n
    source_field: D4N
    type: string
    required: false
    description: "Decimal places name"

processing:
  bronze:
    write_mode: append
    rescued_data_column: "_rescued_data"
  silver:
    processing_type: latest_only
    primary_key:
      - series
      - date
    dedup_columns:
      - date
    dedup_order_by: "_ingested_at DESC"

quality:
  bronze:
    max_null_rate: 0.05
    min_row_count: 1
    max_rescued_data_rate: 1.0
  gold:
    max_null_rate: 0.05
    min_row_count: 1
    value_range_min: -30.0
    value_range_max: 30.0

metadata:
  unit: "% MoM"
  tags:
    - industrial_production
    - pim
    - ibge
    - activity
  domain: activity

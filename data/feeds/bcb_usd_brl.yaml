feed_id: bcb_1
name: "BCB USD/BRL Exchange Rate"
version: "1.0.0"
status: active

source:
  type: api
  url: "https://api.bcb.gov.br/dados/serie/bcdata.sgs.1/dados/ultimos/20?formato=json"
  format: json
  auth_method: none
  rate_limit_rpm: 30
  backfill_url: "https://api.bcb.gov.br/dados/serie/bcdata.sgs.1/dados?formato=json&dataInicial={start}&dataFinal={end}"
  backfill_window_years: 10
  backfill_start_date: "01/07/1994"

schedule:
  cron: "0 6 * * 1-5"
  timezone: "America/Sao_Paulo"
  retry_attempts: 3
  retry_delay_seconds: 60

schema_fields:
  - name: data
    source_field: data
    type: string
    required: true
    description: "Date in dd/mm/yyyy format"
    silver_type: DATE
    silver_expression: "strptime(\"{col}\", '%d/%m/%Y')"
  - name: valor
    source_field: valor
    type: string
    required: true
    description: "USD/BRL exchange rate"
    silver_type: DOUBLE
    silver_expression: "CAST(\"{col}\" AS DOUBLE)"

processing:
  bronze:
    write_mode: append
    rescued_data_column: "_rescued_data"
  silver:
    processing_type: latest_only
    primary_key:
      - series
      - date
    dedup_columns:
      - date
    dedup_order_by: "_ingested_at DESC"

quality:
  bronze:
    max_null_rate: 0.02
    min_row_count: 1
    max_rescued_data_rate: 0.10
  gold:
    max_null_rate: 0.02
    min_row_count: 1
    value_range_min: 0.5
    value_range_max: 10.0

metadata:
  unit: "R$"
  tags:
    - usd_brl
    - exchange_rate
    - bcb
    - forex
  domain: forex

feed_id: tesouro_ipca
name: "Tesouro IPCA+ Avg Real Yield"
version: "1.0.0"
status: active
bronze_source: tesouro

source:
  type: api
  url: "https://www.tesourotransparente.gov.br/ckan/dataset/df56aa42-484a-4a59-8184-7676580c81e3/resource/796d2059-14e9-44e3-80c9-2d9e30b405c1/download/PrecoTaxaTes662.csv"
  format: csv
  auth_method: none
  rate_limit_rpm: 5
  csv_separator: ";"
  csv_header_row: 0
  skip_rows: 0

schedule:
  cron: "0 6 * * 1-5"
  timezone: "America/Sao_Paulo"
  retry_attempts: 3
  retry_delay_seconds: 60

schema_fields:
  - name: tipo_titulo
    source_field: "Tipo Titulo"
    type: string
    required: true
    description: "Bond type name"
  - name: data_vencimento
    source_field: "Data Vencimento"
    type: string
    required: false
    description: "Maturity date dd/mm/yyyy"
  - name: data_base
    source_field: "Data Base"
    type: string
    required: true
    description: "Reference date dd/mm/yyyy"
    silver_type: DATE
    silver_expression: "strptime(\"{col}\", '%d/%m/%Y')"
  - name: taxa_compra_manha
    source_field: "Taxa Compra Manha"
    type: string
    required: true
    description: "Morning buy rate"
    silver_type: DOUBLE
    silver_expression: "CAST(REPLACE(\"{col}\", ',', '.') AS DOUBLE)"
  - name: taxa_venda_manha
    source_field: "Taxa Venda Manha"
    type: string
    required: false
    description: "Morning sell rate"
  - name: pu_compra_manha
    source_field: "PU Compra Manha"
    type: string
    required: false
    description: "Morning buy unit price"
  - name: pu_venda_manha
    source_field: "PU Venda Manha"
    type: string
    required: false
    description: "Morning sell unit price"
  - name: pu_base_manha
    source_field: "PU Base Manha"
    type: string
    required: false
    description: "Morning base unit price"

processing:
  bronze:
    write_mode: append
    rescued_data_column: "_rescued_data"
  silver:
    processing_type: latest_only
    primary_key:
      - series
      - date
    dedup_columns:
      - date
    dedup_order_by: "_ingested_at DESC"
    pre_filter: "tipo_titulo LIKE 'Tesouro IPCA%' OR tipo_titulo LIKE 'Tesouro Educa%' OR tipo_titulo LIKE 'Tesouro Renda%'"
    aggregation: avg

quality:
  bronze:
    max_null_rate: 0.05
    min_row_count: 1
    max_rescued_data_rate: 0.10
  gold:
    max_null_rate: 0.05
    min_row_count: 1
    value_range_min: 0.0
    value_range_max: 20.0

metadata:
  unit: "% a.a."
  tags:
    - tesouro_ipca
    - real_yield
    - inflation_linked
    - fixed_income
  domain: fixed_income
